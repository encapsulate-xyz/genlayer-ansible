---
# maintains directories and paths
webdriver_home_dir: /opt/{{ service_identifier }}

webdriver_bin_dir: "{{ webdriver_home_dir }}/bin"
webdriver_env_dir: "{{ webdriver_home_dir }}/environment"
webdriver_lib_dir: "{{ webdriver_home_dir }}/lib"
webdriver_log_dir: "{{ webdriver_home_dir }}/log"

webdriver_directories:
  - "{{ webdriver_home_dir }}"
  - "{{ webdriver_bin_dir }}"
  - "{{ webdriver_env_dir }}"
  - "{{ webdriver_lib_dir }}"
  - "{{ webdriver_log_dir }}"

webdriver_log_file_path: "{{ webdriver_log_dir }}/{{ service_identifier }}.log"

webdriver_environment_general_file_path: "{{ webdriver_env_dir }}/{{ webdriver_environment_general_file_name }}"
