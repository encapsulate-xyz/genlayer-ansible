---
- name: Create a temporary directory
  ansible.builtin.file:
    path: "{{ tmp_dir }}/{{ service_identifier }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download and unarchive
  vars:
    archive_name: "genlayer-node-linux-amd64-{{ genlayer.web.version }}.tar.gz"
    prefix_url: "{{ system_architecture }}/{{ genlayer.web.version }}/{{ archive_name }}"
  ansible.builtin.unarchive:
    src: "{{ genlayer.source_url }}/{{ prefix_url }}"
    dest: "{{ tmp_dir }}/{{ service_identifier }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Copy the binary file
  vars:
    binary_subpath: "genlayer-node-linux-amd64/third_party/genvm/bin"
  ansible.builtin.copy:
    src: "{{ tmp_dir }}/{{ service_identifier }}/{{ binary_subpath }}/{{ web_service_default_binary_name }}"
    dest: "{{ web_bin_dir }}/{{ service_identifier }}"
    remote_src: true
    owner: root
    group: root
    force: true
    mode: "0755"
  notify:
    - Restart service

- name: Copy the lua script
  vars:
    binary_subpath: "genlayer-node-linux-amd64/third_party/genvm/config"
  ansible.builtin.copy:
    src: "{{ tmp_dir }}/{{ service_identifier }}/{{ binary_subpath }}/{{ web_lua_script_file_name }}"
    dest: "{{ web_lua_script_file_path }}"
    remote_src: true
    owner: "{{ service_identifier }}"
    group: "{{ service_identifier }}"
    force: true
    mode: "0755"
  notify:
    - Restart service

- name: Copy the lib directory
  vars:
    binary_subpath: "genlayer-node-linux-amd64/third_party/genvm/"
  ansible.builtin.copy:
    src: "{{ tmp_dir }}/{{ service_identifier }}/{{ binary_subpath }}/lib/"
    dest: "{{ web_lib_dir }}"
    remote_src: true
    owner: root
    group: root
    force: true
    mode: "0755"
  notify:
    - Restart service

- name: Clean up the temporary files in /tmp
  ansible.builtin.file:
    path: "{{ tmp_dir }}/{{ service_identifier }}"
    state: absent
